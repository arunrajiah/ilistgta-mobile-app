name: Build Android APK (Direct / Manual)

# Triggers:
#   • Every push to main  → debug APK (no EAS credits needed)
#   • workflow_dispatch   → choose debug or release manually from the Actions tab
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    name: Build Android APK (${{ github.event.inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ubuntu-latest ships with Android SDK; expose env vars Gradle needs
      - name: Set up Android SDK environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/tools/bin"       >> $GITHUB_PATH

      # Write .env file from GitHub Secrets so EXPO_PUBLIC_* vars are baked into the JS bundle
      - name: Create .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
          ENVEOF
          # Strip leading whitespace added by heredoc indentation
          sed -i 's/^ *//' .env
          echo ".env written (keys redacted):"
          sed 's/=.*/=***/' .env

      # Expo prebuild generates the native android/ folder from the JS project.
      # app.config.js reads EXPO_PUBLIC_GOOGLE_MAPS_API_KEY and injects it into
      # AndroidManifest.xml as the com.google.android.geo.API_KEY meta-data entry.
      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (${{ github.event.inputs.build_type || 'debug' }})
        working-directory: android
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          if [[ "$BUILD_TYPE" == "release" ]]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}

      - name: Get app version
        id: app_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Locate & rename APK
        id: apk
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          APK_PATH=$(find android/app/build/outputs/apk/${BUILD_TYPE} -name "*.apk" | head -1)
          TIMESTAMP=$(date +%Y%m%d%H%M)
          APK_NAME="ilistgta-v${{ steps.app_version.outputs.version }}-${BUILD_TYPE}-${TIMESTAMP}.apk"
          cp "$APK_PATH" "$APK_NAME"
          echo "path=$APK_NAME" >> $GITHUB_OUTPUT
          echo "name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ilistgta-apk-v${{ steps.app_version.outputs.version }}-${{ github.event.inputs.build_type || 'debug' }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30
