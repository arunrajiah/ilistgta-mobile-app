name: Build Android APK (Direct / Manual)

# Manual-only trigger — use this for quick local-style Gradle builds
# without consuming EAS build credits. Automated builds on push use
# build.yml (EAS) instead to avoid running two competing pipelines.
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    name: Build Android APK (${{ github.event.inputs.build_type }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ubuntu-latest ships with Android SDK; expose env vars Gradle needs
      - name: Set up Android SDK environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/tools/bin"       >> $GITHUB_PATH

      # Write .env file from GitHub Secrets so EXPO_PUBLIC_* vars are baked into the JS bundle
      - name: Create .env from secrets
        run: |
          cat > .env << 'EOF'
          EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EOF
          # Strip leading whitespace
          sed -i 's/^ *//' .env
          echo ".env written:"
          cat .env

      # Expo prebuild generates the native android/ folder from your JS project
      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (${{ github.event.inputs.build_type }})
        working-directory: android
        run: |
          if [[ "${{ github.event.inputs.build_type }}" == "release" ]]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}

      - name: Get app version
        id: app_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Locate & rename APK
        id: apk
        run: |
          APK_DIR="${{ github.event.inputs.build_type }}"
          APK_PATH=$(find android/app/build/outputs/apk/${APK_DIR} -name "*.apk" | head -1)
          TIMESTAMP=$(date +%Y%m%d%H%M)
          APK_NAME="ilistgta-v${{ steps.app_version.outputs.version }}-${APK_DIR}-${TIMESTAMP}.apk"
          cp "$APK_PATH" "$APK_NAME"
          echo "path=$APK_NAME" >> $GITHUB_OUTPUT
          echo "name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ilistgta-apk-v${{ steps.app_version.outputs.version }}-${{ github.event.inputs.build_type }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30
