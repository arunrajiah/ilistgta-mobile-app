name: EAS Build & Submit

# Trigger strategy:
#   develop / release/* push  → preview build (internal testing)
#   v* tag push               → production build + store submission
#   PR to main                → preview build (no submission)
#   workflow_dispatch         → manual with profile + submit options
#
# Push to main does NOT trigger this workflow — use a version tag (v1.0.0)
# to cut a production release. This prevents accidental store submissions
# and avoids failing builds when EAS is not yet configured.
on:
  push:
    branches:
      - develop
      - 'release/*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      submit:
        description: 'Submit to stores after build?'
        required: false
        default: false
        type: boolean

jobs:
  # ─────────────────────────────────────────────
  # Preview build — develop, release/* and PRs
  # ─────────────────────────────────────────────
  preview-build:
    name: Preview Build (Internal Testing)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (
        startsWith(github.ref, 'refs/heads/develop') ||
        startsWith(github.ref, 'refs/heads/release/')
      ))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::EXPO_TOKEN secret is not set."
            echo "Add it under: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (preview)
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS IPA (preview)
        run: eas build --platform ios --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ─────────────────────────────────────────────
  # Production build + store submission — version tags only
  # ─────────────────────────────────────────────
  production-build-and-submit:
    name: Production Build & Submit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          missing=()
          [ -z "${{ secrets.EXPO_TOKEN }}" ]              && missing+=("EXPO_TOKEN")
          [ -z "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" ] && missing+=("GOOGLE_SERVICE_ACCOUNT_KEY")
          [ -z "${{ secrets.ASC_API_KEY }}" ]             && missing+=("ASC_API_KEY")
          [ -z "${{ secrets.ASC_API_KEY_ID }}" ]          && missing+=("ASC_API_KEY_ID")
          [ -z "${{ secrets.ASC_API_KEY_ISSUER_ID }}" ]   && missing+=("ASC_API_KEY_ISSUER_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Add them under: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google Play service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > ./google-service-account.json

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo '${{ secrets.ASC_API_KEY }}' > \
            ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Build Android (production)
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (production)
        run: eas build --platform ios --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}

      - name: Submit Android to Play Store
        run: eas submit --platform android --profile production --non-interactive --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit iOS to App Store Connect
        run: eas submit --platform ios --profile production --non-interactive --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}

      - name: Cleanup credential files
        if: always()
        run: |
          rm -f ./google-service-account.json
          rm -f ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 2>/dev/null || true

  # ─────────────────────────────────────────────
  # Manual dispatch
  # ─────────────────────────────────────────────
  manual-build:
    name: Manual Build (${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::EXPO_TOKEN secret is not set."
            echo "Add it under: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google Play service account key
        if: github.event.inputs.submit == 'true'
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > ./google-service-account.json

      - name: Write App Store Connect API key
        if: github.event.inputs.submit == 'true'
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo '${{ secrets.ASC_API_KEY }}' > \
            ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Build both platforms
        run: eas build --platform all --profile ${{ github.event.inputs.profile }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}

      - name: Submit to stores
        if: github.event.inputs.submit == 'true' && github.event.inputs.profile == 'production'
        run: eas submit --platform all --profile production --non-interactive --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}

      - name: Cleanup credential files
        if: always()
        run: |
          rm -f ./google-service-account.json
          rm -f ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 2>/dev/null || true
